name: CI

# Keyless CI gate for every push and pull request.
# Installs dependencies with uv, then runs linting, file-size rule,
# pytest coverage, mypy type checks, repository validation, and
# documentation sync checks.
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  verify:
    name: Keyless Verification Suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: "3.12"
          version: "0.11.23"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run Ruff lint check
        run: uv run ruff check .

      - name: Check Python file sizes
        shell: bash
        run: |
          violations="$(
            find src -type f -name "*.py" -exec wc -l {} \; |
              awk '$1 > 150 { print }'
          )"

          if [[ -n "${violations}" ]]; then
            echo "Files over the 150-line limit:"
            echo "${violations}"
            exit 1
          fi

          echo "All source files are within the 150-line limit."

      - name: Run tests with coverage
        run: >
          uv run pytest
          --cov=src/ex04
          --cov-report=term-missing
          --cov-fail-under=85

      - name: Type check with mypy
        run: uv run mypy src/ex04 --ignore-missing-imports

      - name: Validate repository
        run: uv run python scripts/validate_repo.py

      - name: Check documentation sync
        run: uv run python scripts/check_docs_sync.py
