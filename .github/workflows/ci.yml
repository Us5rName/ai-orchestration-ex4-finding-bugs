name: CI

# Keyless CI gate for every push and pull request.
# It installs dependencies with uv, then runs linting, the file-size rule,
# pytest coverage, repository validation, and documentation sync checks.
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  verify:
    name: Keyless Verification Suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run Ruff lint check
        run: uv run ruff check .

      - name: Check Python file sizes
        shell: bash
        run: |
          violations="$(
            find src -type f -name "*.py" -exec wc -l {} \; |
              awk '$1 > 150 { print }'
          )"

          if [[ -n "${violations}" ]]; then
            echo "Files over the 150-line limit:"
            echo "${violations}"
            exit 1
          fi

          echo "All source files are within the 150-line limit."

      - name: Run tests with coverage
        run: >
          uv run pytest
          --cov=src/ex04
          --cov-report=term-missing
          --cov-fail-under=85

      - name: Validate repository
        run: uv run python scripts/validate_repo.py

      - name: Check documentation sync
        run: uv run python scripts/check_docs_sync.py
